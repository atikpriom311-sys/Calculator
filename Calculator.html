<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Calculator</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:Arial, sans-serif;
    }

    body{
        background:#111827;
        display:flex;
        justify-content:center;
        align-items:center;
        height:100vh;
    }

    .calculator{
        background:#1f2937;
        padding:20px;
        border-radius:20px;
        box-shadow:0 0 25px rgba(0,0,0,0.4);
        width:320px;
    }

    #display{
        width:100%;
        height:70px;
        border:none;
        border-radius:12px;
        margin-bottom:15px;
        text-align:right;
        padding:15px;
        font-size:2rem;
        background:#374151;
        color:white;
    }

    .buttons{
        display:grid;
        grid-template-columns:repeat(4,1fr);
        gap:10px;
    }

    button{
        height:65px;
        border:none;
        border-radius:12px;
        font-size:1.3rem;
        cursor:pointer;
        transition:0.2s;
    }

    button:hover{
        transform:scale(1.05);
    }

    .number{
        background:#4b5563;
        color:white;
    }

    .operator{
        background:#f59e0b;
        color:white;
    }

    .equal{
        background:#10b981;
        color:white;
    }

    .clear{
        background:#ef4444;
        color:white;
    }
</style>
</head>

<body>

<div class="calculator">
    <input type="text" id="display" disabled>

    <div class="buttons">
        <button class="clear" onclick="clearDisplay()">C</button>
        <button class="operator" onclick="append('/')">÷</button>
        <button class="operator" onclick="append('*')">×</button>
        <button class="operator" onclick="append('-')">−</button>

        <button class="number" onclick="append('7')">7</button>
        <button class="number" onclick="append('8')">8</button>
        <button class="number" onclick="append('9')">9</button>
        <button class="operator" onclick="append('+')">+</button>

        <button class="number" onclick="append('4')">4</button>
        <button class="number" onclick="append('5')">5</button>
        <button class="number" onclick="append('6')">6</button>
        <button class="equal" onclick="calculate()">=</button>

        <button class="number" onclick="append('1')">1</button>
        <button class="number" onclick="append('2')">2</button>
        <button class="number" onclick="append('3')">3</button>
        <button class="number" onclick="append('.')">.</button>

        <button class="number" style="grid-column: span 2;" onclick="append('0')">0</button>
    </div>
</div>

<script>
    const display = document.getElementById("display");

    function append(value){
        display.value += value;
    }

    function clearDisplay(){
        display.value = "";
    }

    function calculate(){
        try{
            display.value = eval(display.value);
        } catch {
            display.value = "Error";
        }
    }
</script>

</body>
</html>

<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8" />

<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Neon Glass Calculator</title>

<style>

*{

    margin:0;

    padding:0;

    box-sizing:border-box;

    font-family:Arial, sans-serif;

}

body{

    height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;

    background:

    radial-gradient(circle at top left,#0f172a,#020617);

    overflow:hidden;

}

/* Neon background glow */

body::before{

    content:"";

    position:absolute;

    width:500px;

    height:500px;

    background:#00f7ff;

    border-radius:50%;

    filter:blur(180px);

    opacity:0.25;

    top:-100px;

    left:-100px;

}

body::after{

    content:"";

    position:absolute;

    width:400px;

    height:400px;

    background:#ff00ff;

    border-radius:50%;

    filter:blur(160px);

    opacity:0.2;

    bottom:-100px;

    right:-100px;

}

/* Calculator */

.calculator{

    position:relative;

    width:340px;

    padding:25px;

    border-radius:25px;

    background:rgba(255,255,255,0.08);

    backdrop-filter:blur(20px);

    -webkit-backdrop-filter:blur(20px);

    border:1px solid rgba(255,255,255,0.15);

    box-shadow:

    0 0 20px rgba(0,255,255,0.2),

    0 0 50px rgba(255,0,255,0.15);

    z-index:1;

}

/* Display */

#display{

    width:100%;

    height:80px;

    border:none;

    outline:none;

    border-radius:18px;

    margin-bottom:20px;

    padding:20px;

    text-align:right;

    font-size:2rem;

    background:rgba(255,255,255,0.08);

    color:#fff;

    box-shadow:

    inset 0 0 10px rgba(255,255,255,0.1),

    0 0 10px rgba(0,255,255,0.15);

}

/* Buttons grid */

.buttons{

    display:grid;

    grid-template-columns:repeat(4,1fr);

    gap:12px;

}

/* Buttons */

button{

    height:70px;

    border:none;

    border-radius:18px;

    cursor:pointer;

    font-size:1.2rem;

    color:white;

    background:rgba(255,255,255,0.08);

    backdrop-filter:blur(10px);

    border:1px solid rgba(255,255,255,0.08);

    transition:0.2s ease;

    box-shadow:

    0 0 10px rgba(255,255,255,0.05);

}

button:hover{

    transform:translateY(-3px) scale(1.03);

    box-shadow:

    0 0 15px #00f7ff,

    0 0 25px #ff00ff;

}

/* Special buttons */

.operator{

    color:#00f7ff;

    font-weight:bold;

}

.equal{

    background:linear-gradient(135deg,#00f7ff,#ff00ff);

    color:white;

    font-weight:bold;

}

.clear{

    color:#ff4d6d;

    font-weight:bold;

}

.zero{

    grid-column:span 2;

}

</style>

</head>

<body>

<div class="calculator">

    <input type="text" id="display" disabled>

    <div class="buttons">

        <button class="clear" onclick="clearDisplay()">C</button>

        <button class="operator" onclick="append('/')">÷</button>

        <button class="operator" onclick="append('*')">×</button>

        <button class="operator" onclick="append('-')">−</button>

        <button onclick="append('7')">7</button>

        <button onclick="append('8')">8</button>

        <button onclick="append('9')">9</button>

        <button class="operator" onclick="append('+')">+</button>

        <button onclick="append('4')">4</button>

        <button onclick="append('5')">5</button>

        <button onclick="append('6')">6</button>

        <button class="equal" onclick="calculate()">=</button>

        <button onclick="append('1')">1</button>

        <button onclick="append('2')">2</button>

        <button onclick="append('3')">3</button>

        <button onclick="append('.')">.</button>

        <button class="zero" onclick="append('0')">0</button>

    </div>

</div>

<script>

const display = document.getElementById("display");

function append(value){

    display.value += value;

}

function clearDisplay(){

    display.value = "";

}

function calculate(){

    try{

        display.value = eval(display.value);

    }

    catch{

        display.value = "Error";

    }

}

</script>

</body>

</html>
